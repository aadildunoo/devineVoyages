<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF385C" />
      <stop offset="100%" stop-color="#E05638" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Outer Rounded Square Container -->
  <rect width="512" height="512" rx="140" fill="url(#logoGrad)" />

  <!-- Sun Rays background accent -->
  <g opacity="0.15" fill="#FFFFFF">
    <circle cx="256" cy="256" r="210" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-dasharray="16 16" />
  </g>

  <!-- Folded Prayer Hands (Namaste) Emblem -->
  <g transform="translate(136, 110) scale(0.95)" fill="#FFFFFF" filter="url(#shadow)">
    <!-- Right Hand -->
    <path d="M120 40 C120 20, 135 10, 145 30 C155 50, 160 120, 160 180 C160 210, 150 240, 130 260 L100 240 C115 210, 120 160, 120 40 Z" />
    <!-- Left Hand -->
    <path d="M132 40 C132 20, 117 10, 107 30 C97 50, 92 120, 92 180 C92 210, 102 240, 122 260 L152 240 C137 210, 132 160, 132 40 Z" />
    <!-- Unified Palm base & Lotus petal flare -->
    <path d="M80 180 C80 130, 95 90, 126 30 C157 90, 172 130, 172 180 C172 235, 145 275, 126 275 C107 275, 80 235, 80 180 Z" />
    <!-- Golden Halo / Aura -->
    <path d="M56 210 C40 180, 45 140, 70 120 C65 145, 68 175, 80 200 Z" fill="#FFE4D4" />
    <path d="M196 210 C212 180, 207 140, 182 120 C187 145, 184 175, 172 200 Z" fill="#FFE4D4" />
  </g>
</svg>